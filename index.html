<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Balloon Pop Party</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Balloon Pop Party!</h1>
    <p>Click the balloons to pop them and earn a super score!</p>
    <div class="score-board">
      <span>Score:</span>
      <strong id="score">0</strong>
    </div>
    <div class="balloon-area" id="balloonArea"></div>
    <button id="startButton">Start the Game</button>
    <p class="instructions">Pop all the balloons before time runs out!</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
